name: AnalysisStudio

options:
  minimumXcodeGenVersion: 2.38.0
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: 5.10
    IPHONEOS_DEPLOYMENT_TARGET: 17.0
    PRODUCT_NAME: Analysis Studio
    MARKETING_VERSION: 0.1.0
    CURRENT_PROJECT_VERSION: 1
    TARGETED_DEVICE_FAMILY: 1,2
    ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
    DEVELOPMENT_ASSET_PATHS: AnalysisStudio/Resources/PreviewContent

targets:
  AnalysisStudio:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: AnalysisStudio
    info:
      path: AnalysisStudio/Info.plist
      properties:
        ANALYSIS_STUDIO_API_BASE_URL: https://ideal-integrity-production-40f0.up.railway.app
        ANALYSIS_STUDIO_APP_MODE: native
        CFBundleDisplayName: Analysis Studio
        UILaunchScreen:
          UIColorName: LaunchBackground
        ITSAppUsesNonExemptEncryption: false
        ANALYSIS_STUDIO_WEB_BASE_URL: https://analysis-platform-pi.vercel.app
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
    settings:
      base:
        CODE_SIGN_ENTITLEMENTS: AnalysisStudio/AnalysisStudio.entitlements
        PRODUCT_BUNDLE_IDENTIFIER: com.yaeeshmahomed.analysisstudio